<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue Demo 01 - Counter</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: #f6f7f9;
        color: #1f2937;
      }

      main {
        width: min(640px, calc(100% - 32px));
        padding: 24px;
        border: 1px solid #d8dee8;
        border-radius: 8px;
        background: #ffffff;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      .counter {
        margin: 24px 0;
        font-size: 48px;
        font-weight: 700;
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      button {
        padding: 10px 14px;
        border: 1px solid #c8d1df;
        border-radius: 6px;
        background: #ffffff;
        cursor: pointer;
        font-size: 16px;
      }

      button:hover {
        background: #eef2f7;
      }

      button.active {
        border-color: #2563eb;
        background: #dbeafe;
        color: #1d4ed8;
      }

      .status {
        margin-top: 16px;
        color: #4b5563;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin: 32px 0 12px;
      }

      .section-title {
        margin: 0;
        font-size: 20px;
      }

      .project-list {
        display: grid;
        gap: 12px;
        padding: 0;
        margin: 0;
        list-style: none;
      }

      .filters {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }

      .project-card {
        padding: 16px;
        border: 1px solid #d8dee8;
        border-radius: 8px;
        background: #fbfcfe;
      }

      .project-card h3 {
        margin: 0 0 8px;
        font-size: 18px;
      }

      .project-card p {
        margin: 0 0 10px;
        color: #4b5563;
      }

      .project-card span {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 999px;
        background: #e8eef7;
        color: #334155;
        font-size: 14px;
      }

      .empty-message {
        padding: 16px;
        border: 1px dashed #c8d1df;
        border-radius: 8px;
        color: #4b5563;
        background: #fbfcfe;
      }

      .message-form {
        display: grid;
        gap: 12px;
        margin-top: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        color: #374151;
      }

      input,
      textarea {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        border: 1px solid #c8d1df;
        border-radius: 6px;
        font: inherit;
      }

      textarea {
        min-height: 90px;
        resize: vertical;
      }

      .preview {
        padding: 16px;
        border: 1px solid #d8dee8;
        border-radius: 8px;
        background: #fbfcfe;
      }

      .preview strong {
        display: block;
        margin-bottom: 6px;
      }
    </style>
  </head>
  <body>
    <main id="app">
      <h1>{{ title }}</h1>
      <p>这是第一个最小 Vue demo：页面显示一个数字，按钮负责修改它。</p>

      <div class="counter">{{ count }}</div>

      <div class="actions">
        <button @click="decrease">-1</button>
        <button @click="increase">+1</button>
        <button @click="reset">Reset</button>
      </div>

      <p class="status">{{ countMessage }}</p>

      <div class="toolbar">
        <h2 class="section-title">项目列表</h2>
        <button @click="toggleProjects">
          {{ showProjects ? "隐藏项目" : "显示项目" }}
        </button>
      </div>

      <div class="filters" v-if="showProjects">
        <button
          v-for="category in categories"
          :key="category"
          :class="{ active: selectedCategory === category }"
          @click="selectCategory(category)"
        >
          {{ category }}
        </button>
      </div>

      <ul class="project-list" v-if="showProjects">
        <li class="project-card" v-for="project in filteredProjects" :key="project.id">
          <h3>{{ project.name }}</h3>
          <p>{{ project.description }}</p>
          <span>{{ project.category }}</span>
        </li>
      </ul>
      <p class="empty-message" v-else>项目列表已隐藏。</p>

      <h2 class="section-title">留言预览</h2>
      <form class="message-form">
        <label>
          你的名字
          <input v-model="visitorName" placeholder="例如：Francis" />
        </label>

        <label>
          留言内容
          <textarea v-model="messageDraft" placeholder="写一句想展示在页面上的话"></textarea>
        </label>
      </form>

      <div class="preview">
        <strong>{{ visitorName || "匿名访客" }}</strong>
        <p>{{ messageDraft || "这里会实时显示你的留言内容。" }}</p>
      </div>
    </main>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
